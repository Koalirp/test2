<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>RemoteKey</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet" />

  <style>
    /* ── Reset & Variables ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0a0a0f;
      --surface:   #13131c;
      --border:    #2a2a3d;
      --accent:    #00f5c4;
      --accent2:   #7b4dff;
      --danger:    #ff4d6d;
      --text:      #e8e8f0;
      --muted:     #5a5a7a;
      --glow:      0 0 30px rgba(0, 245, 196, 0.25);
      --glow2:     0 0 30px rgba(123, 77, 255, 0.35);
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Noise texture overlay ──────────────────────────── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 0; opacity: 0.6;
    }

    /* ── Grid lines ─────────────────────────────────────── */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,245,196,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,245,196,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── Screen manager ─────────────────────────────────── */
    .screen {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 24px;
      z-index: 1;
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .screen.hidden {
      opacity: 0; pointer-events: none; transform: translateY(20px);
    }

    /* ── Login screen ───────────────────────────────────── */
    .logo {
      font-family: 'Syne', sans-serif;
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.03em;
      color: var(--accent);
      text-shadow: 0 0 40px rgba(0,245,196,0.5);
      margin-bottom: 6px;
    }
    .logo span { color: var(--accent2); }

    .tagline {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 24px;
      width: 100%;
      max-width: 360px;
    }

    .field {
      margin-bottom: 18px;
    }
    .field label {
      display: block;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .field input::placeholder { color: var(--muted); }
    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(0,245,196,0.12);
    }

    .btn-join {
      width: 100%;
      padding: 16px;
      background: var(--accent);
      border: none;
      border-radius: 10px;
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      color: #0a0a0f;
      cursor: pointer;
      margin-top: 8px;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      position: relative;
      overflow: hidden;
    }
    .btn-join:active {
      transform: scale(0.97);
      box-shadow: none;
    }
    .btn-join:not(:active) {
      box-shadow: var(--glow);
    }
    .btn-join.loading {
      background: var(--muted);
      pointer-events: none;
    }

    /* Ripple */
    .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(0,0,0,0.2);
      animation: ripple-anim 0.5s ease-out forwards;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      from { transform: scale(0); opacity: 1; }
      to   { transform: scale(4); opacity: 0; }
    }

    .error-msg {
      font-size: 0.72rem;
      color: var(--danger);
      text-align: center;
      margin-top: 14px;
      min-height: 1.1em;
      transition: opacity 0.3s;
    }

    /* ── Connecting screen ──────────────────────────────── */
    .connecting-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 16px;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Control screen ─────────────────────────────────── */
    .key-badge {
      font-family: 'Syne', sans-serif;
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 999px;
      margin-bottom: 32px;
    }
    .key-badge.space {
      background: rgba(0,245,196,0.12);
      color: var(--accent);
      border: 1px solid rgba(0,245,196,0.3);
    }
    .key-badge.m {
      background: rgba(123,77,255,0.12);
      color: #a57fff;
      border: 1px solid rgba(123,77,255,0.3);
    }

    .big-btn {
      width: min(320px, calc(100vw - 48px));
      height: min(320px, calc(100vw - 48px));
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      position: relative;
      overflow: hidden;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .big-btn.space {
      background: radial-gradient(circle at 40% 35%, #1affcd, #00c49a);
      box-shadow: 0 0 60px rgba(0,245,196,0.4), 0 20px 60px rgba(0,0,0,0.5);
    }
    .big-btn.m {
      background: radial-gradient(circle at 40% 35%, #a57fff, #5b2fd4);
      box-shadow: 0 0 60px rgba(123,77,255,0.5), 0 20px 60px rgba(0,0,0,0.5);
    }
    .big-btn:active {
      transform: scale(0.92);
      box-shadow: 0 0 20px rgba(0,245,196,0.2), 0 5px 20px rgba(0,0,0,0.5);
    }
    .big-btn.m:active {
      box-shadow: 0 0 20px rgba(123,77,255,0.3), 0 5px 20px rgba(0,0,0,0.5);
    }

    .btn-icon {
      font-size: 3.5rem;
      line-height: 1;
    }
    .btn-label {
      font-family: 'Syne', sans-serif;
      font-size: 1rem;
      font-weight: 800;
      letter-spacing: 0.1em;
      color: rgba(0,0,0,0.7);
    }

    /* Pulse ring on press */
    .big-btn::after {
      content: '';
      position: absolute; inset: -10px;
      border-radius: 50%;
      border: 3px solid currentColor;
      opacity: 0;
      transition: opacity 0s;
    }
    .big-btn.pressed::after {
      animation: pulse-ring 0.4s ease-out;
    }
    @keyframes pulse-ring {
      0%   { transform: scale(1);   opacity: 0.6; }
      100% { transform: scale(1.2); opacity: 0; }
    }

    .status-bar {
      margin-top: 32px;
      display: flex; align-items: center; gap: 8px;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
      animation: blink 2s ease-in-out infinite;
    }
    .status-dot.disconnected { background: var(--danger); box-shadow: 0 0 8px var(--danger); animation: none; }
    @keyframes blink {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── Disconnect btn ─────────────────────────────────── */
    .btn-disconnect {
      margin-top: 20px;
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    .btn-disconnect:active { border-color: var(--danger); color: var(--danger); }

    /* ── Animations ─────────────────────────────────────── */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-in { animation: fadeIn 0.5s ease both; }
    .anim-in-delay { animation: fadeIn 0.5s ease 0.15s both; }

    /* ── Info note ──────────────────────────────────────── */
    .note {
      font-size: 0.6rem;
      color: var(--muted);
      text-align: center;
      max-width: 300px;
      line-height: 1.7;
      margin-top: 18px;
      opacity: 0.7;
    }
    .note a { color: var(--accent); text-decoration: none; }
  </style>
</head>
<body>

  <!-- ── LOGIN SCREEN ──────────────────────────────────────── -->
  <div id="screen-login" class="screen">
    <div class="logo anim-in">Remote<span>Key</span></div>
    <div class="tagline anim-in">wireless keyboard bridge</div>

    <div class="card anim-in-delay">
      <div class="field">
        <label>IP de la computadora</label>
        <input id="inp-ip" type="text" inputmode="decimal"
               placeholder="192.168.1.X" autocomplete="off" spellcheck="false" />
      </div>
      <div class="field">
        <label>Código de acceso</label>
        <input id="inp-code" type="text" inputmode="text"
               placeholder="XXXXXX" autocomplete="off" spellcheck="false"
               style="text-transform:uppercase; letter-spacing:0.2em;" />
      </div>
      <button class="btn-join" id="btn-join" onclick="doJoin()">JOIN</button>
      <div class="error-msg" id="err-msg"></div>
    </div>

    <div class="note">
      Asegúrate de estar en la misma red Wi-Fi que la PC.<br/>
      La IP y el código los muestra el script Python.
    </div>
  </div>

  <!-- ── CONNECTING SCREEN ─────────────────────────────────── -->
  <div id="screen-connecting" class="screen hidden">
    <div class="spinner"></div>
    <div class="connecting-label">Conectando...</div>
  </div>

  <!-- ── CONTROL SCREEN ────────────────────────────────────── -->
  <div id="screen-control" class="screen hidden">
    <div class="key-badge" id="key-badge">ESPACIO</div>

    <button class="big-btn space" id="big-btn" onpointerdown="sendKey()">
      <div class="btn-icon" id="btn-icon">⎵</div>
      <div class="btn-label" id="btn-label">PRESS</div>
    </button>

    <div class="status-bar">
      <div class="status-dot" id="status-dot"></div>
      <span id="status-text">Conectado</span>
    </div>

    <button class="btn-disconnect" onclick="disconnect()">Desconectar</button>
  </div>

  <!-- ── SCRIPT ────────────────────────────────────────────── -->
  <script>
    /* ── State ─────────────────────────────────────────── */
    let ws = null;
    let myKey = 'ESPACIO';
    let isConnected = false;

    /* ── Screen helpers ────────────────────────────────── */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(s => s.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    /* ── Ripple on join button ─────────────────────────── */
    document.getElementById('btn-join').addEventListener('pointerdown', function(e) {
      const r = this.getBoundingClientRect();
      const d = document.createElement('span');
      d.className = 'ripple';
      const size = Math.max(r.width, r.height);
      d.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-r.left-size/2}px;top:${e.clientY-r.top-size/2}px`;
      this.appendChild(d);
      setTimeout(() => d.remove(), 600);
    });

    /* ── Join ──────────────────────────────────────────── */
    function doJoin() {
      const ip   = document.getElementById('inp-ip').value.trim();
      const code = document.getElementById('inp-code').value.trim().toUpperCase();
      const err  = document.getElementById('err-msg');

      err.textContent = '';

      if (!ip) { err.textContent = 'Ingresa la IP de la PC.'; return; }
      if (!code) { err.textContent = 'Ingresa el código de acceso.'; return; }

      const btn = document.getElementById('btn-join');
      btn.textContent = 'Conectando…';
      btn.classList.add('loading');

      showScreen('screen-connecting');
      connectWS(ip, code);
    }

    /* ── WebSocket ─────────────────────────────────────── */
    function connectWS(ip, code) {
      const url = `ws://${ip}:8765`;
      try { ws = new WebSocket(url); }
      catch(e) { showError('No se pudo crear conexión WebSocket.'); return; }

      const timeout = setTimeout(() => {
        ws.close();
        showError('Tiempo de espera agotado. Verifica la IP.');
      }, 8000);

      ws.onopen = () => {
        clearTimeout(timeout);
        ws.send(JSON.stringify({ type: 'auth', code }));
      };

      ws.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }

        if (msg.type === 'auth_ok') {
          myKey = msg.key; // 'ESPACIO' or 'M'
          isConnected = true;
          updateControlScreen();
          showScreen('screen-control');
        } else if (msg.type === 'error') {
          showError(msg.msg || 'Error desconocido.');
        }
      };

      ws.onclose = () => {
        if (isConnected) {
          isConnected = false;
          setDisconnectedUI();
        }
      };

      ws.onerror = () => {
        clearTimeout(timeout);
        showError('No se pudo conectar. Verifica IP y que el servidor esté activo.');
      };
    }

    /* ── Control screen setup ──────────────────────────── */
    function updateControlScreen() {
      const isSpace = myKey === 'ESPACIO';
      const badge   = document.getElementById('key-badge');
      const bigBtn  = document.getElementById('big-btn');
      const icon    = document.getElementById('btn-icon');
      const label   = document.getElementById('btn-label');

      badge.textContent = myKey;
      badge.className   = 'key-badge ' + (isSpace ? 'space' : 'm');
      bigBtn.className  = 'big-btn '   + (isSpace ? 'space' : 'm');
      icon.textContent  = isSpace ? '⎵' : 'M';
      label.textContent = 'PRESS';

      document.getElementById('status-dot').className = 'status-dot';
      document.getElementById('status-text').textContent = 'Conectado';
    }

    function setDisconnectedUI() {
      document.getElementById('status-dot').className = 'status-dot disconnected';
      document.getElementById('status-text').textContent = 'Desconectado';
    }

    /* ── Send keypress ─────────────────────────────────── */
    function sendKey() {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      ws.send(JSON.stringify({ type: 'keypress' }));

      // Visual feedback
      const btn = document.getElementById('big-btn');
      btn.classList.remove('pressed');
      void btn.offsetWidth; // reflow
      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 400);

      // Haptic feedback
      if (navigator.vibrate) navigator.vibrate(40);
    }

    /* ── Disconnect ────────────────────────────────────── */
    function disconnect() {
      isConnected = false;
      if (ws) { ws.close(); ws = null; }
      const btn = document.getElementById('btn-join');
      btn.textContent = 'JOIN';
      btn.classList.remove('loading');
      showScreen('screen-login');
    }

    /* ── Show error ────────────────────────────────────── */
    function showError(msg) {
      const btn = document.getElementById('btn-join');
      btn.textContent = 'JOIN';
      btn.classList.remove('loading');
      document.getElementById('err-msg').textContent = msg;
      showScreen('screen-login');
    }

    /* ── Prevent double-tap zoom ───────────────────────── */
    document.addEventListener('dblclick', e => e.preventDefault());

    /* ── Focus code input → auto uppercase ────────────── */
    document.getElementById('inp-code').addEventListener('input', function() {
      const pos = this.selectionStart;
      this.value = this.value.toUpperCase();
      this.setSelectionRange(pos, pos);
    });
  </script>
</body>
</html>
